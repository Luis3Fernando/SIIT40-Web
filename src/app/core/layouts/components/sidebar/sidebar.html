<aside class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between h-full">
  <div>
    <div class="p-6 border-b border-slate-100 flex items-center space-x-3">
      <img [src]="logoPath" class="w-8 h-8 rounded-lg object-cover" alt="Logo">
      <span class="font-bold text-lg tracking-tight text-gh-dark">SIIT 4.0</span>
    </div>
    <nav class="p-4 space-y-1">
      @for (item of menuItems; track item.route) {
        <app-sidebar-item [route]="item.route" [label]="item.label"></app-sidebar-item>
      }
    </nav>
  </div>
  <div class="p-4 border-t border-slate-100">
    <a routerLink="/auth/login" class="block w-full text-center px-4 py-2 text-sm font-medium text-gh-danger bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
      Cerrar Sesión
    </a>
  </div>
</aside>
