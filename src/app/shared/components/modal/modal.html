@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 select-none font-sans">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-xs animate-fade-in" (click)="onCancel()"></div>
    <div class="bg-white border border-slate-100 w-full max-w-md rounded-2xl p-6 shadow-2xl relative z-10 animate-scale-up flex flex-col gap-4">
      <div class="flex items-center justify-between border-b border-slate-50 pb-3">
        <h3 class="text-sm font-bold text-slate-900 tracking-wide">{{ title }}</h3>
        <button (click)="onCancel()" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="text-xs text-slate-500 leading-relaxed py-1">
        <ng-content></ng-content>
      </div>
      <div class="flex items-center justify-between pt-2 border-t border-slate-50">
        <button (click)="onCancel()" class="px-4 py-2.5 text-xs font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-xl transition-all cursor-pointer flex items-center justify-center h-full">
          {{ cancelText }}
        </button>
        <app-button (click)="onConfirm()" variant="primary" [text]="confirmText" [isLoading]="isConfirmLoading" class="flex items-center justify-center"></app-button>
      </div>
    </div>
  </div>
}
