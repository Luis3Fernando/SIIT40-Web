<button
  [type]="type"
  [disabled]="disabled || isLoading"
  [ngClass]="variantClasses"
  class="w-full px-4 py-2.5 sm:py-3 rounded-lg font-semibold tracking-wide transition-all shadow-sm flex items-center justify-center space-x-2 cursor-pointer disabled:opacity-75 disabled:cursor-not-allowed text-sm sm:text-base"
>
  @if (!isLoading) {
    <span>{{ text }}</span>
  } @else {
    <svg class="animate-spin h-5 w-5 text-current" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  }
</button>
