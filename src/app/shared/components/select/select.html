<div class="flex flex-col gap-1.5 font-sans w-full relative">
  @if (label) {
    <span class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 select-none">{{ label }}</span>
  }
  <div (click)="toggle()" [ngClass]="isOpen ? 'border-blue-600 ring-2 ring-blue-600/10' : 'border-slate-200 hover:border-slate-300 bg-white'" class="flex items-center justify-between w-full px-3 py-2 border rounded-xl text-xs font-bold text-slate-800 cursor-pointer select-none transition-all h-9">
    <span>{{ selectedLabel }}</span>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" [ngClass]="{'rotate-180': isOpen}" class="w-3.5 h-3.5 text-slate-400 transition-transform duration-200"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
  </div>
  @if (isOpen) {
    <div class="absolute left-0 top-[calc(100%+4px)] w-full bg-white border border-slate-100 rounded-xl shadow-xl z-50 overflow-hidden max-h-60 overflow-y-auto animate-fade-in py-1">
      @for (opt of options; track opt.value) {
        <div (click)="selectOption(opt.value)" [ngClass]="opt.value === value ? 'bg-slate-50 text-slate-900 font-bold' : 'text-slate-600 hover:bg-slate-50/80'" class="px-4 py-2.5 text-xs transition-colors cursor-pointer text-left select-none">
          {{ opt.label }}
        </div>
      }
    </div>
  }
</div>
