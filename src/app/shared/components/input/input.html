<div class="w-full flex flex-col gap-1.5 font-sans">
  @if (label) {
    <div class="flex items-center gap-1 text-[11px] font-semibold uppercase tracking-wider text-slate-500">
      <span>{{ label }}</span>
      @if (infoText) {
        <app-popover>
          <button type="button" trigger class="text-slate-400 hover:text-slate-600 transition-colors cursor-pointer focus:outline-none flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" /></svg>
          </button>
          <div content class="text-slate-500 text-[11px] font-medium p-1 normal-case tracking-normal max-w-55 leading-relaxed">{{ infoText }}</div>
        </app-popover>
      }
    </div>
  }
  <div class="relative flex items-center w-full">
    @if (type === 'color') {
      <div class="flex items-center space-x-2 w-full">
        <input type="color" [name]="name" [ngModel]="value" (input)="onInputChange($event)" (blur)="onTouch()" class="w-8 h-8 rounded-lg border border-slate-100 bg-transparent cursor-pointer shrink-0" />
        <input type="text" [name]="name + '_text'" [value]="value" (input)="onInputChange($event)" (blur)="onTouch()" placeholder="#000000" class="w-full px-1 py-2 bg-transparent border-b border-t-0 border-x-0 border-slate-200 rounded-none text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-slate-900 transition-all" [ngClass]="{'border-red-500 focus:border-red-500': errorText}" />
      </div>
    } @else {
      <input type="text" [name]="name" [value]="value" (input)="onInputChange($event)" (blur)="onTouch()" [placeholder]="placeholder" class="w-full px-1 py-2 bg-transparent border-b border-t-0 border-x-0 border-slate-200 rounded-none text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-slate-900 transition-all" [ngClass]="{'border-red-500 focus:border-red-500': errorText}" [required]="required" />
    }
  </div>
  @if (errorText) {
    <span class="text-[11px] text-gh-danger font-medium tracking-wide animate-fade-in">{{ errorText }}</span>
  }
</div>
