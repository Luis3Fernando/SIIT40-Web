<div class="space-y-6 font-sans text-slate-800 max-w-2xl mx-auto select-none p-1 animate-fade-in">
  <div class="bg-white border border-slate-100 rounded-2xl shadow-xs p-6 space-y-6">
    <div>
      <h2 class="text-base font-bold text-slate-900 tracking-tight">Registrar nueva siembra</h2>
      <p class="text-xs text-slate-500 mt-0.5">Asigna lotes botánicos a una sección específica de riego automático dentro de la infraestructura.</p>
    </div>
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-500">Seleccionar especie</label>
          <select name="species_id" [(ngModel)]="form.species_id" class="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl text-xs text-slate-800 focus:outline-none focus:border-slate-900 focus:bg-white transition-all appearance-none cursor-pointer">
            @for (item of speciesList; track item.species_id) {
              <option [value]="item.species_id">{{ item.name }} ({{ item.scientific_name }})</option>
            }
          </select>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-500">Zona de cultivo</label>
          <select name="zone" [(ngModel)]="form.zone" class="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl text-xs text-slate-800 focus:outline-none focus:border-slate-900 focus:bg-white transition-all appearance-none cursor-pointer">
            <option value="A">Zona A - Módulos verticales</option>
            <option value="B">Zona B - Camas hidropónicas</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-500">Etapa fenológica inicial</label>
          <select name="stage" [(ngModel)]="form.stage" class="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl text-xs text-slate-800 focus:outline-none focus:border-slate-900 focus:bg-white transition-all appearance-none cursor-pointer">
            <option value="Germinación">Germinación</option>
            <option value="Vegetativo">Vegetativo</option>
            <option value="Floración">Floración</option>
            <option value="Cosecha">Maduración / Cosecha</option>
          </select>
        </div>
        <app-input label="Cantidad de unidades siembra" type="number" name="count" [(ngModel)]="form.count" placeholder="Ej. 10"></app-input>
      </div>
      <div class="flex items-center justify-between pt-4 border-t border-slate-50">
        <button type="button" (click)="goBack()" class="px-4 py-2 text-xs font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-xl transition-all cursor-pointer">Cancelar</button>
        <app-button type="submit" variant="dark" text="Registrar lote" [isLoading]="isSubmitting"></app-button>
      </div>
    </form>
  </div>
</div>
