<div class="space-y-6 font-sans text-slate-800 max-w-2xl mx-auto select-none p-1 animate-fade-in">
  <div class="bg-white border border-slate-100 rounded-2xl shadow-xs p-6 space-y-6">
    <div>
      <h2 class="text-base font-bold text-slate-900 tracking-tight">Modificar especie</h2>
      <p class="text-xs text-slate-500 mt-0.5">Actualiza los rangos óptimos de las variables críticas para el ecosistema hídrico automatizado.</p>
    </div>
    @if (isLoading) {
      <div class="space-y-4 animate-pulse">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="h-12 bg-slate-50 rounded-xl"></div>
          <div class="h-12 bg-slate-50 rounded-xl"></div>
        </div>
        <div class="grid grid-cols-1 gap-4">
          <div class="h-12 bg-slate-50 rounded-xl"></div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div class="h-12 bg-slate-50 rounded-xl"></div>
          <div class="h-12 bg-slate-50 rounded-xl"></div>
          <div class="h-12 bg-slate-50 rounded-xl"></div>
        </div>
      </div>
    } @else {
      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <app-input label="Nombre de la especie" name="name" [(ngModel)]="form.name" placeholder="Ej. Lechuga" infoText="Nombre común o comercial con el que identificas la planta dentro del invernadero."></app-input>
          <app-input label="Nombre científico" name="scientific_name" [(ngModel)]="form.scientific_name" placeholder="Ej. Lactuca sativa" infoText="Denominación taxonómica internacional de la especie utilizada para la investigación."></app-input>
        </div>
        <div class="grid grid-cols-1 gap-4">
          <app-input label="Color identificador" type="color" name="color" [(ngModel)]="form.color" infoText="Código hexadecimal único asignado para diferenciar la especie en las gráficas perimetrales."></app-input>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <app-input label="Volumen de riego (L)" type="number" name="vol" [(ngModel)]="form.vol" placeholder="Ej. 0.2" infoText="Cantidad neta de agua en litros que las electroválvulas dispensarán en cada pulso."></app-input>
          <app-input label="Frecuencia de riego (h)" type="number" name="freq" [(ngModel)]="form.freq" placeholder="Ej. 12" infoText="Intervalo de tiempo expresado en horas entre ciclos programados automáticos."></app-input>
          <app-input label="Umbral hídrico (RAW)" type="number" name="raw" [(ngModel)]="form.raw" placeholder="Ej. 2200" infoText="Valor analógico bruto del sensor de suelo por debajo del cual se disparará el riego."></app-input>
        </div>
        <div class="flex items-center justify-between pt-4 border-t border-slate-50">
          <button type="button" (click)="goBack()" class="px-4 py-2 text-xs font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-xl transition-all cursor-pointer">Cancelar</button>
          <app-button type="submit" variant="dark" text="Actualizar especie" [isLoading]="isSubmitting"></app-button>
        </div>
      </form>
    }
  </div>
</div>
