<div class="space-y-6 font-sans text-slate-800 max-w-6xl mx-auto select-none animate-fade-in">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 bg-white border border-slate-100 rounded-2xl p-6 shadow-xs">
    <div>
      <h2 class="text-lg font-bold text-slate-900 tracking-tight">Catálogo de especies</h2>
      <p class="text-xs text-slate-500 mt-0.5">Administración y control de los perfiles botánicos cultivados en el invernadero Lahuani.</p>
    </div>
    <app-button variant="primary" text="Agregar especie" (click)="goToCreate()"></app-button>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <div class="bg-white border border-slate-100 rounded-2xl p-5 shadow-xs flex flex-col justify-between hover:border-gh-light/60 transition-all">
      <div class="space-y-4">
        <div class="flex items-start justify-between">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gh-primary/10 flex items-center justify-center text-gh-primary text-xl">🍅</div>
            <div>
              <h3 class="text-sm font-bold text-slate-900 truncate">Tomate cherry</h3>
              <span class="inline-flex items-center gap-1 mt-1 px-2 py-0.5 bg-slate-50 border border-slate-100 rounded-md text-[10px] font-semibold text-slate-600">Zona a</span>
            </div>
          </div>
          <div class="flex items-center space-x-1">
            <button (click)="goToEdit(1)" class="p-1.5 text-slate-400 hover:text-gh-primary hover:bg-slate-50 rounded-lg transition-colors cursor-pointer">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" /></svg>
            </button>
            <button class="p-1.5 text-slate-400 hover:text-gh-danger hover:bg-slate-50 rounded-lg transition-colors cursor-pointer">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
            </button>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3 pt-2 border-t border-slate-50">
          <div class="bg-slate-50 p-2.5 rounded-xl">
            <span class="block text-[10px] font-medium text-slate-400">Temperatura ideal</span>
            <span class="text-xs font-bold text-slate-800 mt-0.5">18.0°C - 24.0°C</span>
          </div>
          <div class="bg-slate-50 p-2.5 rounded-xl">
            <span class="block text-[10px] font-medium text-slate-400">Humedad de suelo</span>
            <span class="text-xs font-bold text-slate-800 mt-0.5">60.0% - 80.0%</span>
          </div>
        </div>
      </div>
      <div class="mt-4 flex items-center gap-1.5 text-[10px] font-semibold text-gh-primary bg-gh-primary/5 border border-gh-primary/10 rounded-lg px-2.5 py-1 w-fit"><span class="w-1 h-1 rounded-full bg-gh-primary"></span>Monitoreo activo</div>
    </div>
  </div>
</div>
