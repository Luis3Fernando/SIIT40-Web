<div class="space-y-6 font-sans text-slate-800 max-w-2xl mx-auto select-none p-1 animate-fade-in">
  <div class="bg-white border border-slate-100 rounded-2xl shadow-xs p-6 space-y-6">
    <div>
      <h2 class="text-base font-bold text-slate-900 tracking-tight">Registrar nueva especie</h2>
      <p class="text-xs text-slate-500 mt-0.5">Configura un nuevo perfil botánico para la automatización de los rangos óptimos de riego y clima.</p>
    </div>
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <app-input label="Nombre de la especie" name="name" [(ngModel)]="name" placeholder="Ej. Lechuga" infoText="Nombre común o comercial con el que identificas la planta dentro del invernadero."></app-input>
        <app-input label="Nombre científico" name="scientificName" [(ngModel)]="scientificName" placeholder="Ej. Lactuca sativa" infoText="Denominación taxonómica internacional de la especie utilizada para la investigación."></app-input>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <app-input label="URL de la imagen" name="imageUrl" [(ngModel)]="imageUrl" placeholder="https://ejemplo.com/imagen.jpg" infoText="Enlace web de la ilustración que servirá como portada visual en el catálogo."></app-input>
        <app-input label="Color identificador" type="color" name="color" [(ngModel)]="color" infoText="Código hexadecimal único asignado para diferenciar la especie en las gráficas perimetrales."></app-input>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <app-input label="Volumen de riego (L)" type="number" name="vol" [(ngModel)]="vol" placeholder="Ej. 0.2" infoText="Cantidad neta de agua en litros que las electroválvulas dispensarán en cada pulso."></app-input>
        <app-input label="Frecuencia de riego (h)" type="number" name="freq" [(ngModel)]="freq" placeholder="Ej. 12" infoText="Intervalo de tiempo expresado en horas entre ciclos programados automáticos."></app-input>
        <app-input label="Umbral hídrico (RAW)" type="number" name="raw" [(ngModel)]="raw" placeholder="Ej. 2200" infoText="Valor analógico bruto del sensor de suelo por debajo del cual se disparará el riego."></app-input>
      </div>
      <div class="flex items-center justify-between pt-4 border-t border-slate-50">
        <button type="button" (click)="goBack()" class="px-4 py-2 text-xs font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-xl transition-all cursor-pointer">Cancelar</button>
        <app-button type="submit" variant="dark" text="Guardar especie" [isLoading]="isLoading"></app-button>
      </div>
    </form>
  </div>
</div>
